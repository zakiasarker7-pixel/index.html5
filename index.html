<!DOCTYPE html>
<html>
<head>
    <title>My Professional Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* Navbar */
        .navbar {
            background: #1e1e2f;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(to right, #4e54c8, #8f94fb);
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
        }

        .btn {
            background: white;
            color: #4e54c8;
            padding: 10px 20px;
            border: none;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Section */
        .section {
            padding: 40px;
            text-align: center;
        }

        .card-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        /* Footer */
        .footer {
            background: #1e1e2f;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

    <!-- Hero -->
    <div class="hero">
        <h1>Hi, I'm a Web Developer 🚀</h1>
        <p>I create modern and responsive websites</p>
        <button class="btn">Hire Me</button>
    </div>

    <!-- Services -->
    <div class="section">
        <h2>My Services</h2>

        <div class="card-container">

            <div class="card">
                <h3>Web Design</h3>
                <p>Modern responsive website design</p>
            </div>

            <div class="card">
                <h3>Landing Page</h3>
                <p>High converting landing pages</p>
            </div>

            <div class="card">
                <h3>Blog Setup</h3>
                <p>Professional blog websites</p>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 My Portfolio Website | All Rights Reserved
    </div>

</body>
</html>
